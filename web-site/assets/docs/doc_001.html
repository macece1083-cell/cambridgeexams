MORE","No colour in the chart was as popular as blue. Use: THE","People use black to talk about danger in this article. Use: THE COLOUR","Purple dye was expensive, so only rich people used it. Use: BECAUSE","This is a common colour, but it is still powerful. Use: ALTHOUGH"],"reading":"For centuries, colours have done more than decorate our world. In ancient times, purple dye was produced from sea snails, so it was extremely expensive. Because only powerful people could afford it, purple became connected with royalty and luxury. Later, new chemical dyes made purple available to ordinary people, but the colour kept many of its old associations. Today, companies still choose colours carefully. A warning sign may use red or yellow because those colours are easy to notice. A bank may choose blue to suggest trust. Even when people do not think consciously about colour, it can affect their decisions and feelings.","gist":["Put these ideas in the order they appear: modern companies, ancient dye, old associations.","What is the main purpose of the text?","Which sentence best explains why purple was once a luxury colour?","Find one example of colour being used for safety.","What does the final sentence suggest about colour and behaviour?"],"inference":["Why did purple keep its powerful meaning after it became easier to buy?","What can we infer about companies that choose blue for their logos?","Which detail shows that colour meanings can be historical?","How does the text connect cost and status?","Why might red be useful in an emergency?","Use one phrase from the text as evidence for your answer."],"vocabContext":[["associations","ideas or feelings connected with something"],["afford","to have enough money to buy something"],["consciously","with awareness or deliberate thought"],["available","easy to get or use"],["suggest","to communicate an idea indirectly"]],"grammarContext":["Use a superlative to compare purple with other ancient dyes.","Use the correctly: ___ colour blue can suggest trust.","Rewrite with a comparative: Yellow signs are easy to notice. Red signs are easier.","Complete with a/an/the/-: ___ warning signs often use bright colours.","Write one sentence comparing two colours and their effects."],"extendedPrompt":"Write 120-150 words explaining how one colour can affect people's behaviour. Include one historical example and one modern example."},"2":{"vocab":[["immune system","the body system that protects against illness"],["infection","a disease caused by bacteria or a virus"],["adolescent","a young person between childhood and adulthood"],["structure","the way parts are organised"],["researcher","a person who studies a topic carefully"],["symptom","a sign of an illness"],["positive","hopeful or useful"],["comfortable","relaxed and not worried"],["survive","to continue living"],["treat","to give medical care"]],"wordFormation":["Stress can cause ___ and make it difficult to sleep. (NERVOUS)","Regular rest can improve your physical and emotional ___ . (HEALTHY)","The researcher studied the ___ of the teenage brain. (STRUCTURAL)","A balanced routine can make students feel more ___ . (COMFORT)","Some symptoms disappear after medical ___ . (TREAT)","A positive friendship can reduce feelings of ___ . (LONELY)"],"grammarAccuracy":["Correct the mistake: She speaks very careful when she feels stressed.","Choose: Lack of sleep makes many teenagers (tired / tiredly).","Correct: I hardly ever am relaxed before exams.","Complete: Exercise affects mood ___ . (positive / positively)","Correct: The film made me nervously.","Choose: He checks his phone (constant / constantly) during lessons."],"transform":["Stress affects my sleep. It makes me tired. Use: MAKE","She studies carefully every night. Use: ADVERB OF FREQUENCY","The news was shocking. I felt worried. Use: MADE","He is rarely relaxed before exams. Use: HARDLY EVER","The illness was serious, but she survived. Use: ALTHOUGH"],"reading":"Scientists are learning more about the teenage brain. During adolescence, the brain is still developing, especially the parts that help people plan, control emotions and make decisions. This does not mean teenagers cannot make good choices. It means sleep, exercise and positive relationships are especially important. When students do not rest enough, they may feel anxious or find it harder to concentrate. However, healthy routines can protect both body and mind. Researchers suggest that teenagers should understand how their brains work, because this knowledge can help them take better care of themselves.","gist":["Write a one-sentence summary of the text.","Which three factors are especially important for teenagers?","What misconception does the text correct?","Which part of the brain's role is mentioned?","What advice does the writer imply?"],"inference":["Why does the writer mention planning and emotions?","What can we infer about sleep and school performance?","Which sentence suggests teenagers have responsibility for their well-being?","Why is knowledge about the brain useful?","How does the text balance challenge and hope?","Give evidence from the text for one inference."],"vocabContext":[["adolescence","the period between childhood and adulthood"],["concentrate","to give attention to one thing"],["relationships","connections between people"],["routines","regular habits or ways of doing things"],["anxious","worried or nervous"]],"grammarContext":["Complete: Stress can make students ___ . (anxious/anxiously)","Rewrite using an adverb: He is careful when he studies.","Write a sentence with rarely about sleep.","Use make + adjective to describe exercise and mood.","Correct: She always is tired after staying up late."],"extendedPrompt":"Write 120-150 words classifying two negative effects of stress on teenagers. Use categories, examples and at least two adverbs."},"3":{"vocab":[["constant","happening all the time"],["interfere","to get in the way of something"],["security","protection against danger or crime"],["privacy","the state of keeping personal information safe"],["rely on","to need or depend on"],["take over","to gain control"],["interrupt","to stop someone while they are doing something"],["demand","to require attention or action"],["username","a name used to access an online account"],["digital","connected with computers or technology"]],"wordFormation":["Too many notifications can ___ with concentration. (INTERFERENCE)","Students should protect their ___ when they use social media. (PRIVATE)","A strong password improves online ___ . (SECURE)","Many apps are designed to be ___ and easy to use. (DIGIT)","Technology can increase ___ between people far away. (COMMUNICATE)","A message that arrives every minute can be very ___ . (INTERRUPT)"],"grammarAccuracy":["Correct: Students must to protect their passwords.","Choose: You (mustn't / don't have to) share private information online.","Correct: This website might be dangerous; I am completely sure it is safe.","Complete: That message ___ be from Sara; she never writes in English. (can't / must / has to)","Choose: We (can / have to) use the school tablets; the teacher says it is required.","Correct: You should to turn off notifications while studying."],"transform":["It is necessary to create a strong password. Use: HAVE TO","It is forbidden to copy another person's account. Use: MUSTN'T","Maybe the app is collecting data. Use: MIGHT","I am sure this is not my username. Use: CAN'T","My advice is to check your privacy settings. Use: SHOULD"],"reading":"Calm technology is designed to help people without constantly demanding their attention. Instead of interrupting users with alerts, it stays in the background until it is really needed. Some designers believe this kind of technology can reduce stress and help people focus. For example, a device might quietly show information with a light or a simple sound instead of sending a long message. Critics argue that no technology is completely calm if people rely on it too much. The real question is not whether technology is good or bad, but how thoughtfully people design and use it.","gist":["What is calm technology?","What contrast does the writer make between alerts and quiet signals?","Which sentence shows a critical opinion?","What is the writer's final point?","Is the text mainly descriptive, persuasive or narrative? Explain briefly."],"inference":["Why might calm technology reduce stress?","What can we infer about designers who support calm technology?","Why does the writer include critics?","What does thoughtfully suggest in the final sentence?","How could a school use calm technology responsibly?","Quote or paraphrase one detail as evidence."],"vocabContext":[["demanding","requiring attention or effort"],["background","not the main focus"],["critics","people who judge or question something"],["rely on","depend on"],["thoughtfully","carefully and with good judgement"]],"grammarContext":["Use must to write one online safety rule.","Use might to express uncertainty about an app.","Use can't to express a logical conclusion.","Rewrite: It is a good idea to mute notifications. Use should.","Correct: We don't have to cheat in online exams."],"extendedPrompt":"Write 120-150 words giving your opinion about whether smartphones help or harm students' focus. Include one fact, one opinion and at least three modal verbs."},"4":{"vocab":[["expedition","a journey made for exploration or research"],["artefact","an old object made by humans"],["remains","parts left from the past"],["accurate","correct and exact"],["identify","to recognise what something is"],["destination","the place someone is going to"],["virtual","created by computer"],["preparation","planning before an activity"],["succeed","to achieve an aim"],["transmit","to send information or signals"]],"wordFormation":["Careful ___ is essential before an underwater expedition. (PREPARE)","The scientist tried to ___ the strange stone shape. (IDENTIFICATION)","The team's measurements were surprisingly ___ . (ACCURACY)","A virtual tour can make exploration more ___ to students. (ACCESS)","The divers set off after several days of ___ . (PREPARE)","The blog gave a detailed ___ of the discovery. (DESCRIBE)"],"grammarAccuracy":["Correct: Divers would explored the area every summer.","Choose: The team (used to / use to) travel by boat.","Correct: They didn't used to take virtual cameras.","Complete: The archaeologist ___ the remains in 1986. (examined / would examine)","Choose: When she was a student, she (would / did) study maps for hours.","Correct: They setted off before sunrise."],"transform":["In the past, scientists travelled with paper maps. Use: USED TO","Every summer, the team explored the same reef. Use: WOULD","They found the artefact in 1995. Make a question.","The site looked natural, but some people believed it was a city. Use: ALTHOUGH","The expedition failed because the weather changed. Use: DUE TO"],"reading":"Near the coast of Yonaguni Jima, divers found huge underwater rock formations. Some people believe the straight lines and steps are the remains of an ancient city. Others argue that the shapes were created naturally by the movement of the Earth and the sea. Scientists have examined the site, but they do not all agree. The mystery continues because the evidence can be interpreted in different ways. For explorers, this uncertainty is part of the attraction: underwater places can raise questions that are difficult, but exciting, to answer.","gist":["What two explanations does the text present?","What is the author's purpose?","Which details make the site seem artificial?","Why does the mystery continue?","What attitude does the final sentence express?"],"inference":["Why might straight lines make people think of a city?","What can we infer about scientific disagreement?","Why is uncertainty attractive to explorers?","Does the writer clearly choose one explanation? Explain.","What evidence would help solve the mystery?","Use one detail from the text as support."],"vocabContext":[["formations","natural shapes or structures"],["interpreted","understood or explained in a particular way"],["uncertainty","not being sure"],["ancient","very old"],["attraction","something interesting or appealing"]],"grammarContext":["Use used to to describe an old exploration habit.","Use would to describe a repeated past action.","Write one past simple question about the discovery.","Correct: They didn't used to use online maps.","Complete: The diver ___ a strange carving yesterday. (find)"],"extendedPrompt":"Write 120-150 words contrasting two explanations for an underwater mystery. Use although, however and one past-habit structure."},"5":{"vocab":[["adapt","to change in order to survive"],["harsh","difficult or unpleasant"],["thrive","to grow or live successfully"],["tolerate","to accept or survive a difficult condition"],["pressure","force caused by weight or stress"],["oxygen","a gas people and animals need to live"],["remarkable","unusual and impressive"],["parasite","a living thing that lives on or in another living thing"],["lack of","not having enough of something"],["typical","usual or normal"]],"wordFormation":["Some creatures show remarkable ___ to extreme cold. (ADAPT)","The deep ocean has high ___ and little light. (PRESS)","A parasite can ___ on another animal. (SURVIVAL)","The desert is a ___ environment for most mammals. (HARSHLY)","These animals are not typical; they are highly ___ . (USUAL)","Scientists study the ___ of life in extreme places. (VARIOUS)"],"grammarAccuracy":["Correct: I have saw animals in a harsh environment.","Choose: This fish is as strange (as / than) the parasite in the article.","Correct: She has never went to Antarctica.","Complete: The animal ___ in darkness for millions of years. (has lived / lived)","Choose: The desert is not as (cold / colder) as Antarctica.","Correct: They have discovered the creature last year."],"transform":["This animal survives in colder water than crease people's ___ of local history. (AWARE)","The city showed ___ for artists by protecting the mural. (RESPECTFUL)"],"grammarAccuracy":["Correct: I have seen the mural yesterday.","Choose: The artist (painted / has painted) three walls since 2020.","Correct: Somebody have removed the sign.","Complete: ___ in the neighbourhood likes the new statue. (Everyone / Everything)","Choose: We didn't see (anything / something) unusual in the square.","Correct: The city has built the sculpture in 2015."],"transform":["The artist started painting murals in 2019 and still paints them. Use: HAS","They removed the illegal graffiti yesterday. Use: TAKE DOWN","No person knew who painted the wall. Use: NOBODY","The mural is beautiful, but not everyone loves it. Use: ALTHOUGH","This is the first time I have visited the art show. Use: NEVER"],"reading":"Rio de Janeiro is famous for public art. In some neighbourhoods, murals have transformed grey walls into colourful outdoor galleries. These paintings can celebrate local history, express political opinions or simply bring pleasure to people who pass by. However, public art can also create debate. Some people believe graffiti damages public space, while others see it as a voice for communities that are often ignored. The most successful projects usually involve local people, artists and city officials working together.","gist":["What is the main idea of the text?","List two purposes of murals.","What disagreement does the text describe?","Which group should be involved in successful projects?","What does transformed suggest about the walls?"],"inference":["Why might public art create debate?","What can we infer about ignored communities?","Why is cooperation important in public art projects?","How can a mural be both artistic and political?","What attitude does the writer have toward successful projects?","Use one detail as evidence."],"vocabContext":[["transformed","changed completely"],["debate","discussion with different opinions"] function normalizeGrade(g){const n=Number(g);const list=availableGrades();return list.includes(n)?n:(list.includes(defaultGrade())?defaultGrade():list[0])}
function activeGrade(cls=""){const fromClass=gradeFromClass(cls);const list=availableGrades();if(list.includes(fromClass))return fromClass;const g=normalizeGrade(state.tymm?.grade);state.tymm||(state.tymm={grade:g});state.tymm.grade=String(g);return g}

function esc(v){return String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]))}

function parseRange(q){const m=String(q).match(/(\d+)(?:-(\d+))?/);return m?[Number(m[1]),Number(m[2]||m[1])]:null}
function formativeInfo(type){

function feedbackRows(meta,type){const rows=type==="A"?meta.faFb:meta.fbFb;return currentBook().examLevel==="basic"&&type==="B"?[...rows,["17","Transfer writing: use one idea from the text in your own clear sentence."]]:rows}
function sectionFeedback(meta,type,secId){const wanted=parseRange(QR[type]?.[secId]);if(!wanted)return"";return feedbackRows(meta,type).filter(([q])=>{const r=parseRange(q);return r&&r[0]<=wanted[1]&&r[1]>=wanted[0]}).map(([q,fb])=>`${q}: ${fb}`).join(" ")}
function downloadText(filename,content,type="text/html;charset=utf-8"){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),800)}
function playListeningAudio(btn){const text=btn?.getAttribute("data-listening-text")||"";if(!("speechSynthesis" in window)){alert("Audio playback is not supported in this browser.");return}window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=.86;u.pitch=1;window.speechSynthesis.speak(u)}

function examABasic(meta,bank){const match=bank.vocab.slice(0,6),choices=match.map(([,definition],i)=>`${String.fromCharCode(65+i)}) ${definition}`).join(" · ");return `${examBlock("A2 - Matching /6","Match each word with its English definition.",`<div class="word-box">${choices.split(" · ").map(x=>`<span class="word-chip">${esc(x)}</span>`).join("")}</div><ol>${match.map(([en])=>`<li>${esc(en)} <span class="answer-line"></span></li>`).join("")}</ol>`)}${examBlock("A3 - Fill in the Blanks /3","Choose the correct word from the box and write it in the sentence.",`<div class="word-box">${bank.vocab.map(([en])=>`<span class="word-chip">${esc(en)}</span>`).join("")}</div><ol>${bank.blanks.map(s=>`<li>${esc(s)}</li>`).join("")}</ol>`)}${examBlock("A4 - Grammar Awareness /2","Circle the correct option.",`<ol>${bank.grammarChoice.map(s=>`<li>${esc(s)}</li>`).join("")}</ol>`)}${examBlock("A5 - Grammar Production /4","Complete the sentences using the clue in brackets.",`<ol>${bank.grammarProd.map(s=>`<li>${esc(s)}</li>`).join("")}</ol>`)}`}
function examBBasic(meta,bank){return `${examBlock("B1 - Pre-reading /2","Answer briefly before you read.",`<ol><li>Look at the title. What do you think the text is about?</li><li>Write one thing you know about this topic.</li></ol>`)}${examBlock("Reading Text",esc(meta.reading),`<div class="reading-box">${esc(bank.reading)}</div>`)}${examBlock("B2 - Skim & Scan /3","Read quickly and answer the questions.",`<ol><li>Who or what is the text about?</li><li>What is the main idea of the text?</li><li>Write one important word or idea from the text.</li></ol>`)}${examBlock("B3 - Deep Understanding /4","Answer according to the text.",`<ol><li>Why is the person or topic in the text important?</li><li>What problem, purpose or benefit is explained in the text?</li><li>Write one supporting detail from the text.</li><li>Explain the message of the text in one sentence.</li></ol>`)}${examBlock("B4 - Vocabulary in Context /3","Match the words with their meanings in the text.",`<ol>${bank.vocabContext.map(([w,d])=>`<li><strong>${esc(w)}</strong>: ${esc(d)}</li>`).join("")}</ol>`)}${examBlock("B5 - Grammar Production /4","Choose the correct word or complete the sentence.",`<ol>${[...bank.grammarChoice,...bank.grammarProd.slice(0,2)].map(s=>`<li>${esc(s)}</li>`).join("")}</ol>`)}${examBlock("B6 - Transfer Writing /1","Write one thing you learned from the text in your own sentence.",`<p><span class="answer-line" style="min-width:92%"></span></p>`)}`}
function examAAdvanced(meta,bank){const choices=bank.vocab.slice(0,8).map(([,definition],i)=>`${String.fromCharCode(65+i)}) ${definition}`).join(" | ");return `${examBlock("A1 - Vocabulary Depth /8","Match each unit word with the most precise English definition. Two-word answers must be copied accurately.",`<div class="word-box">${choices.split(" | ").map(x=>`<span class="word-chip">${esc(x)}</span>`).join("")}</div><ol>${bank.vocab.slice(0,8).map(([word])=>`<li>${esc(word)} <span class="answer-line"></span></li>`).join("")}</ol>`)}${examBlock("A2 - Word Formation & Collocation /6","Complete each sentence with the correct form of the word in brackets. Spelling counts.",`<ol>${bank.wordFormation.map(s=>`<li>${esc(s)}</li>`).join("")}</ol>`)}${examBlock("A3 - Grammar Accuracy /6","Choose the best option or correct the mistake. Rewrite the full corrected phrase when necessary.",`<ol>${bank.grammarAccuracy.map(s=>`<li>${esc(s)}</li>`).join("")}</ol>`)}${examBlock("A4 - Sentence Transformation /5","Rewrite each sentence using the word or structure given. Keep the meaning as close as possible.",`<ol>${bank.transform.map(s=>`<li>${esc(s)}<br><span class="answer-line" style="min-width:88%"></span></li>`).join("")}</ol>`)}${examBlock("A5 - Guided Writing /5",`Write 90-120 words. Topic: ${meta.writingFocus}. Use at least four unit vocabulary items and two target grammar structures.`,`<p><span class="answer-line" style="min-width:96%"></span></p><p><span class="answer-line" style="min-width:96%"></span></p><p><span class="answer-line" style="min-width:96%"></span></p><p><span class="answer-line" style="min-width:96%"></span></p>`)}`}
function examBAdvanced(meta,bank){return `${examBlock("B1 - Prediction & Activation /3","Answer before reading. Use complete sentences.",`<ol><li>What do you expect this text to explain about ${esc(meta.name)}?</li><li>Write one question you hope the text will answer.</li><li>Write one unit word that may be important and explain why.</li></ol>`)}${examBlock("Reading Text",esc(meta.reading),`<div class="reading-box">${esc(bank.reading)}</div>`)}${examBlock("B2 - Gist & Structure /5","Read for main idea, organisation and important details.",`<ol>${bank.gist.map(s=>`<li>${esc(s)}</li>`).join("")}</ol>`)}${examBlock("B3 - Inference & Evidence /6","Answer according to the text. Support your ideas with evidence where possible.",`<ol>${bank.inference.map(s=>`<li>${esc(s)}</li>`).join("")}</ol>`)}${examBlock("B4 - Vocabulary in Context /5","Explain the meaning of each word or phrase as it is used in the text.",`<ol>${bank.vocabContext.map(([w,d])=>`<li><strong>${esc(w)}</strong>: ${esc(d)}</li>`).join("")}</ol>`)}${examBlock("B5 - Grammar in Context /5","Use the unit grammar to complete or rewrite the sentences.",`<ol>${bank.grammarContext.map(s=>`<li>${esc(s)}</li>`).join("")}</ol>`)}${examBlock("B6 - Extended Response /6",bank.extendedPrompt,`<p><span class="answer-line" style="min-width:96%"></span></p><p><span class="answer-line" style="min-width:96%"></span></p><p><span class="answer-line" style="min-width:96%"></span></p><p><span class="answer-line" style="min-width:96%"></span></p><p><span class="answer-line" style="min-width:96%"></span></p>`)}`}
function examBlock(title,lead,body){return`<div class="exam-section"><h3>${esc(title)}</h3><p>${esc(lead)}</p>${body}</div>`}
function mebOutcomeCode(grade,unit,skill){return grade===5?`ENG.${grade}.${unit}.${skill}`:`E${grade}.${unit}.${skill}`}
function mebOfficialTheme(grade,unit){return (MEB_THEMES[grade]||MEB_THEMES[8])[Math.max(0,Math.min(7,unit-1))]||tymmTheme(unit,grade)}
function mebScenarioOutcomes(grade,unit,scenario){
  const pattern=(MEB_PATTERNS[grade]?.[scenario]||MEB_PATTERNS[grade]?.[1]||MEB_PATTERNS[8][1]);
  const split=Math.ceil(pattern.length/2),next=Math.min(8,unit+1);
  return pattern.map((skill,i)=>{const u=i<split?unit:next;return{skill,unit:u,theme:mebOfficialTheme(grade,u),code:mebOutcomeCode(grade,u,skill)}});
}
function mebPoint(i,total){const base=Math.floor(100/total),rem=100-base*total;return base+(i<rem?1:0)}
function mebWritingWords(grade){return grade<=5?"50-70":grade===6?"70-90":grade===7?"90-110":"110-140"}
function mebLongReadingText(meta,bank,grade){
  const words=(bank.vocab||[]).slice(0,6).map(([w])=>w).join(", ");
  const base=bank.reading||`This unit is about ${meta.nameFull}. Students read, think and write about the topic by using unit vocabulary and target grammar.`;
  const extra=grade<=6
    ?` In this text, the ideas are connected with daily life. Students can notice familiar words such as ${words}. They can find the main idea, choose useful details, and explain one simple reason. The paragraph is longer than a basic exercise, but the sentences are clear and the topic stays close to the unit.`
    :` The topic also asks students to compare information, explain reasons, and connect the text with their own experiences. Students should support their answers with details from the text and use unit vocabulary naturally. This extended paragraph gives enough context for short-answer and open-ended questions without turning the exam into a multiple-choice test.`;
  return `${base} ${extra}`;
}
function mebListeningScript(meta,bank,grade){
  return `Teacher script. Read twice at normal classroom speed. Audio version: ${mebListeningAudioText(meta,bank,grade)}`;
}
function mebListeningAudioText(meta,bank,grade){
  const words=(bank.vocab||[]).slice(0,5).map(([w])=>w).join(", ");
  const theme=mebOfficialTheme(grade,meta.unit);
  if(grade<=6)return `Today, a student is talking about ${theme.toLowerCase()}. The student says that ${meta.name.toLowerCase()} is connected to real life. There are important words in the unit, such as ${words}. The student gives one example, explains one simple reason, and says why the topic is useful at school. Listen for the main idea, one detail, and one word from the unit.`;
  return `A student gives a short talk about ${theme.toLowerCase()} and connects it with ${meta.nameFull.toLowerCase()}. The speaker explains the main problem or purpose, gives two supporting details, and uses unit words such as ${words}. The speaker also gives a personal opinion and suggests one responsible action. Listen for the main idea, specific details, the speaker's opinion, and one inference.`;
}
function mebListeningQuestions(meta,grade){
  const q1=grade<=6?"Listen and write the main idea of the talk in one sentence.":"Listen and explain the speaker's main opinion. Support your answer with one detail from the talk.";
  const q2=grade<=6?"Complete the notes: Topic: ________ / One detail: ________ / One unit word: ________.":"Complete the notes: Main point: ________ / Supporting detail: ________ / Inference: ________.";
  return `<li><div><strong>Type 1 - Short Answer · 10 points</strong></div><p>${esc(q1)}</p><p><span class="answer-line" style="min-width:96%"></span></p></li><li><div><strong>Type 2 - Complete the Notes · 10 points</strong></div><p>${esc(q2)}</p><p><span class="answer-line" style="min-width:96%"></span></p><p><span class="answer-line" style="min-width:96%"></span></p></li>`;
}
function mebListeningQuestion(outcome,index,meta,grade){
  return grade<=6?"Listen and write one short answer based on the talk.":"Listen and write one supported answer based on the talk.";
}
function mebWritingPrompt(meta,grade){
  return `Write ${mebWritingWords(grade)} words about ${meta.nameFull}. Use at least three unit vocabulary items and one target grammar structure (${meta.g1} or ${meta.g2}). Give a clear beginning, supporting details, and a final sentence.`;
}
function mebQuestionText(outcome,index,bank,meta){
  const v=bank.vocab?.[index%Math.max(1,bank.vocab.length)]||["unit word","a word from the unit"];
  const vc=bank.vocabContext?.[index%Math.max(1,bank.vocabContext?.length||1)]||v;
  const gItems=[...(bank.grammarContext||[]),...(bank.grammarProd||[]),...(bank.grammarChoice||[])];
  const g=gItems[index%Math.max(1,gItems.length)]||`Write one correct sentence using ${meta.g1}.`;
  const s=outcome.skill;
  if(s.startsWith("L"))return mebListeningQuestion(outcome,index,meta,activeGrade());
  if(s.startsWith("R2"))return "Skim the reading text. Write the main topic in one short phrase and copy one word from the text that helped you.";
  if(s.startsWith("R3")||s==="R1")return "Read the text carefully. Answer in a complete sentence: What is the most important idea in the text?";
  if(s.startsWith("R4"))return "Write two sentences connecting one idea from the text with your own life, school or community.";
  if(s.startsWith("W3"))return `Write a short guided paragraph about ${meta.name}. Use the reading text as a model and include three unit words.`;
  if(s.startsWith("W4")||s==="W1")return `Write 5-7 original sentences about ${meta.nameFull}. Use at least two unit words and one target grammar structure.`;
  if(s.startsWith("V"))return `Write the unit word or phrase that means this: "${vc[1]}". Then use it in your own sentence.`;
  if(s.startsWith("G"))return `Complete or rewrite the sentence accurately: ${g}`;
  return "Answer the question in a complete sentence using unit vocabulary.";
}
function mebExamPaper(meta){
  const grade=activeGrade(),scenario=Number(state.exams.mebScenario||1),bank=EXAM_BANK[meta.unit]||{},outcomes=mebScenarioOutcomes(grade,meta.unit,scenario);
  const listening=outcomes.filter(o=>o.skill.startsWith("L"));
  const writing=outcomes.filter(o=>o.skill.startsWith("W"));
  const other=outcomes.filter(o=>!o.skill.startsWith("L")&&!o.skill.startsWith("W"));
  const sectionPoint=(i,total,sectionTotal)=>{const n=Math.max(1,total),base=Math.floor(sectionTotal/n),rem=sectionTotal-base*n;return base+(i<rem?1:0)};
  let li=0,oi=0,wi=0;
  const distribution=outcomes.map((o,i)=>{const pts=o.skill.startsWith("L")?sectionPoint(li++,listening.length,20):o.skill.startsWith("W")?sectionPoint(wi++,writing.length||1,30):sectionPoint(oi++,other.length,50);return`<tr><td>${i+1}</td><td>${esc(o.theme)}</td><td>${esc(o.code)}</td><td>${esc(o.skill)}</td><td>${pts}</td></tr>`}).join("");
  const audioText=mebListeningAudioText(meta,bank,grade);
  const listeningQs=mebListeningQuestions(meta,grade);
  const questions=other.map((o,i)=>`<li><div><strong>${esc(o.code)} · ${esc(o.theme)} · ${sectionPoint(i,other.length,50)} points</strong></div><p>${esc(mebQuestionText(o,i,bank,meta))}</p><p><span class="answer-line" style="min-width:96%"></span></p><p><span class="answer-line" style="min-width:96%"></span></p></li>`).join("");
  const writingItems=writing.length?writing:[{code:mebOutcomeCode(grade,meta.unit,"W1"),theme:mebOfficialTheme(grade,meta.unit),skill:"W1"}];
  const writingQs=writingItems.map((o,i)=>`<li><div><strong>${esc(o.code)} · ${esc(o.theme)} · Writing · ${sectionPoint(i,writingItems.length,30)} points</strong></div><p>${esc(mebWritingPrompt(meta,grade))}</p><p><span class="answer-line" style="min-width:96%"></span></p><p><span class="answer-line" style="min-width:96%"></span></p><p><span class="answer-line" style="min-width:96%"></span></p><p><span class="answer-line" style="min-width:96%"></span></p></li>`).join("");
  return `<section class="exam-paper"><div class="exam-head"><div><div class="exam-kicker">MEB Scenario-Aligned Written Exam</div><div class="exam-title">Grade ${grade} English - Scenario ${scenario} Written Exam</div><p style="font-size:13px;color:#64748b;margin-top:6px">Book unit: ${esc(meta.nameFull)} · MEB distribution theme: ${esc(mebOfficialTheme(grade,meta.unit))} · Listening + Reading + Language + Writing</p></div><div class="exam-meta"><div>Name Surname: ____________________</div><div>Class: ________ Number: ________</div><div>Date: ____ / ____ / ______</div><div>Total: 100 points</div></div></div><div class="exam-section"><h3>Scenario Distribution</h3><p>This paper follows the MEB common-written-exam scenario logic with a listening component: open-ended and short-answer questions only. Do not use multiple-choice, matching or true/false question types.</p><table><thead><tr><th>No</th><th>Theme</th><th>Outcome</th><th>Skill</th><th>Points</th></tr></thead><tbody>${distribution}</tbody></table></div><div class="exam-section"><h3>Listening Audio</h3><p>Use the generated audio controls below. Play the audio twice for students.</p><div class="audio-row"><button class="audio-btn" type="button" data-listening-text="${esc(audioText)}" onclick="playListeningAudio(this)">Play Listening Audio</button><button class="audio-btn stop" type="button" onclick="stopListeningAudio()">Stop Audio</button><span class="audio-note">Audio is generated in the browser from the listening text.</span></div></div><div class="exam-section"><h3>Listening Script for Teacher</h3><p>Teacher reference. Students should answer from the audio, not from this script.</p><div class="reading-box">${esc(mebListeningScript(meta,bank,grade))}</div></div><div class="exam-section"><h3>Listening Questions</h3><ol>${listeningQs}</ol></div><div class="exam-section"><h3>Reading Text</h3><p>Read the text before answering the reading and language questions.</p><div class="reading-box">${esc(mebLongReadingText(meta,bank,grade))}</div></div><div class="exam-section"><h3>Reading, Vocabulary and Grammar Questions</h3><ol>${questions}</ol></div><div class="exam-section"><h3>Writing Task</h3><ol>${writingQs}</ol></div><div class="exam-section"><h3>Writing Scoring Rubric</h3><p>Task completion and content: 10 points. Organisation and coherence: 8 points. Vocabulary range and accuracy: 6 points. Grammar accuracy: 6 points. Award partial credit for clear meaning at A1-A2 level even when minor errors are present.</p></div><div class="exam-section"><h3>Overall Scoring Rubric</h3><p>Listening: 20 points. Reading and language use: 50 points. Writing: 30 points. Accept equivalent short answers when they show the same meaning.</p></div></section>`;
}

button class="btn btn-green" style="padding:10px 36px;font-size:15px" data-act="save-scores">💾 Kaydet</button></div></div><div class="card"><h3 style="font-weight:700;font-size:15px;margin-bottom:12px">📋 Formatif ${state.entry.type} TYMM Geri Bildirim Kılavuzu — Unit ${state.entry.unit}: ${esc(meta.name)}</h3><div style="display:grid;gap:6px">${feedbackRows(meta,state.entry.type).map(([q,fb])=>fbRow(q,fb)).join("")}</div></div>`;

function scoreRow(st,ss){

  return`<tr><td style="font-weight:700;white-space:nowrap">${esc(st.name)}</td>${ss.map(sec=>{const val=sc[sec.id]??"";const cls=val!==""?gst(Number(val),sec.total):"";return`<td class="c" style="padding:3px"><input class="sc ${cls}" type="number" min="0" max="${sec.total}" value="${esc(val)}" data-score="1" data-sid="${st.id}" data-sec="${sec.id}"></td>`}).join("")}<td class="c mono fw7" style="color:${colorForGrade(d)}">${d!==null?d:"–"}</td><td class="c" style="font-size:16px">${rowStatus}</td></tr>`;

function entryErrors(students,ss,meta){
  return students.map(st=>{const sc=state.entry.scores[st.id]||{};const issues=ss.map(sec=>{const raw=sc[sec.id];if(raw===""||raw===undefined||raw===null)return null;const status=gst(Number(raw),sec.total);return status==="g"?null:{sec,raw,status,pct:Math.round(Number(raw)/sec.total*100),fb:sectionFeedback(meta,state.entry.type,sec.id)}}).filter(Boolean);return{student:st,issues}}).filter(x=>x.issues.length)
}

function renderAnalysis(){

function skillRow(key,label,entries){if(!entries.length)return"";const latest=entries[entries.length-1];const trend=entries.length>=2?(entries[entries.length-1].correct/entries[entries.length-1].total)-(entries[0].correct/entries[0].total):0;return`<div class="sk-row"><span style="font-size:22px">${statusIcon(latest.status)}</span><div class="sk-info"><div class="sk-name">${esc(label)}</div><div class="sk-det">${entries.map(e=>`Ü${e.unit}${e.type}:${e.correct}/${e.total}`).join(" → ")}</div></div><div style="font-size:12px;font-weight:700;color:${trend>0?"var(--green)":trend<0?"var(--red)":"var(--g400)"};flex-shrink:0">${entries.length>=2?(trend>0?"↑ İlerleme":trend<0?"↓ Gerileme":"→ Sabit"):""}</div><div class="sk-pct" style="color:${latest.status==="g"?"var(--green)":latest.status==="y"?"var(--yellow)":"var(--red)"}">${Math.round(latest.correct/latest.total*100)}%</div></div>`}

function renderClassRpt(){

  if(t.dataset.change==="dek-cls"){state.dek.cls=t.value;render()}
  if(t.dataset.change==="analysis-sid"){state.analysis.sid=t.value;render()}
  if(t.dataset.change==="class-unit"){state.classrpt.unit=Number(t.value);render()}
  if(t.dataset.change==="class-cls"){state.classrpt.cls=t.value;render()}
});
document.addEventListener("input",e=>{
  const t=e.target;if(!t.dataset.score)return;setScoreFromInput(t);
});
function setScoreFromInput(t){
  const sid=Number(t.dataset.sid),secId=t.dataset.sec,sec=secs(state.entry.type).find(s=>s.id===secId);
  if(!sec)return;
  const value=clampScore(t.value,sec.total);
  state.entry.scores[sid]||(state.entry.scores[sid]={});
  state.entry.scores[sid][secId]=value;
  t.value=value;
  t.className=`sc ${value!==""?gst(Number(value),sec.total):""}`;
}

function addStudent(){const name=document.getElementById("student-name")?.value.trim(),cls=document.getElementById("student-cls")?.value||"5-A";if(!name)return;save({...data,students:[...data.students,{id:data.nextId,name,cls}],nextId:data.nextId+1})}
function addBulk(){const cls=document.getElementById("student-cls")?.value||"5-A";const names=(document.getElementById("bulk-names")?.value||"").split("\n").map(n=>n.trim()).filter(Boolean);if(!names.length)return;let next=data.nextId;const students=[...data.students,...names.map(name=>({id:next++,name,cls}))];state.students.showBulk=false;save({...data,students,nextId:next})}
function removeStudent(id){if(!confirm("Bu öğrenciyi ve tüm notlarını silmek istediğinize emin misiniz?"))return;save({...data,students:data.students.filter(s=>s.id!==id),assessments:data.assessments.filter(a=>a.studentId!==id)})}
function resetData(){if(!confirm("TÜM VERİLERİ silmek istediğinize emin misiniz?"))return;state.entry.scoreKey="";save(emptyData())}
function exportData(){downloadText(`${currentBook().filePrefix}_yedek_${new Date().toISOString().split("T")[0]}.json`,JSON.stringify(data,null,2),"application/json;charset=utf-8")}
function importData(file){if(!file)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d.students)&&Array.isArray(d.assessments)){state.entry.scoreKey="";save({...emptyData(),...d});alert("Veriler başarıyla yüklendi ✓")}else alert("Geçersiz dosya")}catch{alert("Dosya okunamadı")}};r.readAsText(file)}
function saveScores(){const cur=currentEntry();const kept=data.assessments.filter(a=>!(cur.students.some(s=>s.id===a.studentId)&&a.unit===state.entry.unit&&a.type===state.entry.type));cur.students.forEach(st=>{const sc=state.entry.scores[st.id];if(sc&&Object.values(sc).some(v=>v!==""&&v!==null&&v!==undefined)){kept.push({studentId:st.id,unit:state.entry.unit,type:state.entry.type,scores:{...sc},date:new Date().toISOString().split("T")[0]})}});data={...data,assessments:kept};persist();state.entry.scoreKey="";alert("Notlar kaydedildi ✓");render()}

render();
</script>
